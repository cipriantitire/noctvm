<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOCTVM Brand System v3.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body style="margin:0;padding:0;background:#050505">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ═══════════════════════════════════════════════════════
// BRAND TOKENS
// ═══════════════════════════════════════════════════════
const B = {
  void: "#050505", obsidian: "#0A0A0A", smoke: "#111111", ash: "#1A1A1A",
  concrete: "#2A2A2A", steel: "#8A8A8A", bone: "#E8E4DF", chalk: "#F5F3F0",
  white: "#FFFFFF", ultraviolet: "#7C3AED", violet: "#8B5CF6", orchid: "#A78BFA",
  lavender: "#C4B5FD", magenta: "#DB2777", fuchsia: "#E879A0", neon: "#C026D3",
  emerald: "#10B981", signal: "#EF4444",
  display: "'Syne', sans-serif",
  mono: "'JetBrains Mono', monospace",
  body: "'DM Sans', sans-serif",
};

// ═══════════════════════════════════════════════════════
// SYMBOL — Original (crescent opens LEFT)
// ═══════════════════════════════════════════════════════
const Symbol = ({ size = 80, color = "#fff", style = {} }) => (
  <svg width={size} height={size} viewBox="0 0 120 120" fill="none" style={style}>
    <path d="M70 14C49.5 14 32 28 27 47C31.5 45.5 36.3 44.7 41.3 44.7C62.5 44.7 79.7 61.9 79.7 83.1C79.7 86.3 79.3 89.4 78.5 92.3C93.8 86.5 105 71.7 105 54.3C105 32 89.5 14 70 14Z" fill={color} opacity="0.95" />
    <line x1="12" y1="86" x2="108" y2="86" stroke={color} strokeWidth="2" opacity="0.5" />
    <path d="M70 112C78 112 85 109 90 104C87.5 105 84.5 105.5 81.5 105.5C72 105.5 64 99 62 90C61.5 92 61 94 61 96C61 104 65 112 70 112Z" fill={color} opacity="0.12" />
    <line x1="30" y1="94" x2="90" y2="94" stroke={color} strokeWidth="0.75" opacity="0.15" />
    <line x1="40" y1="100" x2="80" y2="100" stroke={color} strokeWidth="0.5" opacity="0.08" />
  </svg>
);

// MIRRORED symbol (crescent opens RIGHT — for C replacement)
const SymbolMirrored = ({ size = 80, color = "#fff", style = {} }) => (
  <svg width={size} height={size} viewBox="0 0 120 120" fill="none" style={{ transform: "scaleX(-1)", ...style }}>
    <path d="M70 14C49.5 14 32 28 27 47C31.5 45.5 36.3 44.7 41.3 44.7C62.5 44.7 79.7 61.9 79.7 83.1C79.7 86.3 79.3 89.4 78.5 92.3C93.8 86.5 105 71.7 105 54.3C105 32 89.5 14 70 14Z" fill={color} opacity="0.95" />
    <line x1="12" y1="86" x2="108" y2="86" stroke={color} strokeWidth="2" opacity="0.5" />
    <path d="M70 112C78 112 85 109 90 104C87.5 105 84.5 105.5 81.5 105.5C72 105.5 64 99 62 90C61.5 92 61 94 61 96C61 104 65 112 70 112Z" fill={color} opacity="0.12" />
    <line x1="30" y1="94" x2="90" y2="94" stroke={color} strokeWidth="0.75" opacity="0.15" />
    <line x1="40" y1="100" x2="80" y2="100" stroke={color} strokeWidth="0.5" opacity="0.08" />
  </svg>
);

// Inline mirrored for wordmark
const MoonC = ({ size = 32, color = "#fff" }) => (
  <svg width={size * 0.85} height={size} viewBox="0 0 120 120" fill="none"
    style={{ display: "inline-block", verticalAlign: "middle", transform: "scaleX(-1)", position: "relative", top: "-1px", margin: `0 ${size * -0.04}px` }}>
    <path d="M70 14C49.5 14 32 28 27 47C31.5 45.5 36.3 44.7 41.3 44.7C62.5 44.7 79.7 61.9 79.7 83.1C79.7 86.3 79.3 89.4 78.5 92.3C93.8 86.5 105 71.7 105 54.3C105 32 89.5 14 70 14Z" fill={color} opacity="0.95" />
    <line x1="12" y1="86" x2="108" y2="86" stroke={color} strokeWidth="2" opacity="0.5" />
    <path d="M70 112C78 112 85 109 90 104C87.5 105 84.5 105.5 81.5 105.5C72 105.5 64 99 62 90C61.5 92 61 94 61 96C61 104 65 112 70 112Z" fill={color} opacity="0.12" />
    <line x1="30" y1="94" x2="90" y2="94" stroke={color} strokeWidth="0.75" opacity="0.15" />
    <line x1="40" y1="100" x2="80" y2="100" stroke={color} strokeWidth="0.5" opacity="0.08" />
  </svg>
);

// ═══════════════════════════════════════════════════════
// WORDMARK VARIANTS
// ═══════════════════════════════════════════════════════
const Wordmark = ({ size = 32, color = "#fff", spacing = "0.3em" }) => (
  <span style={{ fontSize: `${size}px`, fontFamily: B.display, fontWeight: 800, letterSpacing: spacing, color, lineHeight: 1 }}>NOCTVM</span>
);

const WordmarkIntegrated = ({ size = 32, color = "#fff", spacing = "0.22em" }) => (
  <span style={{ fontSize: `${size}px`, fontFamily: B.display, fontWeight: 800, letterSpacing: spacing, color, lineHeight: 1, display: "inline-flex", alignItems: "center" }}>
    NO<MoonC size={size * 1.05} color={color} />TVM
  </span>
);

const Tagline = ({ size = 9, color = "#fff", opacity = 0.35 }) => (
  <span style={{ fontSize: `${size}px`, fontFamily: B.mono, letterSpacing: "0.25em", color, opacity, textTransform: "uppercase" }}>
    THE LIVING MEMORY OF THE NIGHT
  </span>
);

// Lockup
const Lockup = ({ variant = "standard", size = "md", color = "#fff", layout = "vertical" }) => {
  const s = { sm: { sym: 28, txt: 13, gap: 8, tag: 7 }, md: { sym: 44, txt: 22, gap: 12, tag: 8 }, lg: { sym: 64, txt: 34, gap: 16, tag: 9 }, xl: { sym: 88, txt: 48, gap: 20, tag: 10 } }[size] || { sym: 44, txt: 22, gap: 12, tag: 8 };
  const isV = layout === "vertical";
  const WM = variant === "integrated" ? WordmarkIntegrated : Wordmark;
  return (
    <div style={{ display: "flex", flexDirection: isV ? "column" : "row", alignItems: "center", gap: `${s.gap}px` }}>
      <Symbol size={s.sym} color={color} />
      <div style={{ display: "flex", flexDirection: "column", alignItems: isV ? "center" : "flex-start", gap: "3px" }}>
        <WM size={s.txt} color={color} />
        <Tagline size={s.tag} color={color} />
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════
// UTILITY COMPONENTS
// ═══════════════════════════════════════════════════════
const SH = ({ n, title, sub }) => (
  <div style={{ marginBottom: "48px" }}>
    <div style={{ fontSize: "10px", fontFamily: B.mono, letterSpacing: "0.3em", color: "rgba(255,255,255,0.2)", marginBottom: "10px" }}>{n}</div>
    <h2 style={{ fontSize: "clamp(26px, 4vw, 38px)", fontFamily: B.display, fontWeight: 800, color: "#fff", letterSpacing: "-0.02em", margin: "0 0 8px", lineHeight: 1.1 }}>{title}</h2>
    {sub && <p style={{ fontSize: "14px", fontFamily: B.body, color: "rgba(255,255,255,0.4)", lineHeight: 1.7, maxWidth: "560px", margin: 0 }}>{sub}</p>}
  </div>
);

const Swatch = ({ name, hex, large }) => {
  const [c, setC] = useState(false);
  const light = ["#E8E4DF", "#F5F3F0", "#FFFFFF"].includes(hex);
  return (
    <div onClick={() => { navigator.clipboard?.writeText(hex); setC(true); setTimeout(() => setC(false), 1200); }} style={{ cursor: "pointer" }}
      onMouseEnter={e => e.currentTarget.style.transform = "scale(1.03)"} onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}>
      <div style={{ width: "100%", height: large ? "100px" : "68px", background: hex, borderRadius: "2px", border: `1px solid ${light ? "rgba(0,0,0,0.08)" : "rgba(255,255,255,0.06)"}`, display: "flex", alignItems: "center", justifyContent: "center", transition: "transform 0.15s" }}>
        {c && <span style={{ fontSize: "9px", fontFamily: B.mono, letterSpacing: "0.15em", color: light ? "#000" : "#fff", background: "rgba(0,0,0,0.4)", padding: "3px 8px", borderRadius: "2px" }}>COPIED</span>}
      </div>
      <div style={{ marginTop: "5px" }}>
        <div style={{ fontSize: "10px", fontFamily: B.mono, color: "rgba(255,255,255,0.6)", letterSpacing: "0.05em" }}>{name}</div>
        <div style={{ fontSize: "9px", fontFamily: B.mono, color: "rgba(255,255,255,0.25)", textTransform: "uppercase" }}>{hex}</div>
      </div>
    </div>
  );
};

const Div = () => <div style={{ height: "1px", background: "rgba(255,255,255,0.04)" }} />;

// ═══════════════════════════════════════════════════════
// MAIN
// ═══════════════════════════════════════════════════════
function NoctvmBrandV3() {
  const [nav, setNav] = useState("cover");
  const items = [{ id: "cover", l: "COVER" }, { id: "logo", l: "LOGO" }, { id: "colors", l: "COLORS" }, { id: "type", l: "TYPE" }, { id: "rules", l: "RULES" }, { id: "apps", l: "APPLY" }, { id: "voice", l: "VOICE" }];

  useEffect(() => {
    const h = () => { for (let i = items.length - 1; i >= 0; i--) { const el = document.getElementById(items[i].id); if (el && el.getBoundingClientRect().top <= 80) { setNav(items[i].id); break; } } };
    window.addEventListener("scroll", h); return () => window.removeEventListener("scroll", h);
  }, []);

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{background:${B.void}}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.25)}
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes breathe{0%,100%{opacity:0.03}50%{opacity:0.07}}
      `}</style>

      {/* NAV */}
      <nav style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, background: "rgba(5,5,5,0.88)", backdropFilter: "blur(24px)", borderBottom: "1px solid rgba(255,255,255,0.04)", height: "52px", padding: "0 32px", display: "flex", alignItems: "center", gap: "24px" }}>
        <Symbol size={20} color="#fff" />
        <div style={{ width: "1px", height: "16px", background: "rgba(255,255,255,0.08)" }} />
        <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.2)" }}>BRAND SYSTEM v3.0</span>
        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", gap: "2px" }}>
          {items.map(n => <a key={n.id} href={`#${n.id}`} style={{ padding: "6px 10px", fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.15em", textDecoration: "none", color: nav === n.id ? "#fff" : "rgba(255,255,255,0.25)", background: nav === n.id ? "rgba(139,92,246,0.12)" : "transparent", borderRadius: "2px", transition: "all 0.2s" }}>{n.l}</a>)}
        </div>
      </nav>

      <div style={{ paddingTop: "52px" }}>

        {/* ── COVER ── */}
        <section id="cover" style={{ minHeight: "90vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "80px 32px", position: "relative", overflow: "hidden", background: B.void }}>
          <div style={{ position: "absolute", width: "600px", height: "600px", borderRadius: "50%", background: "radial-gradient(circle, rgba(124,58,237,0.06) 0%, transparent 70%)", top: "5%", right: "-15%", filter: "blur(100px)", animation: "breathe 8s ease-in-out infinite" }} />
          <div style={{ position: "relative", zIndex: 1, textAlign: "center", animation: "fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both" }}>
            <Symbol size={100} color="#fff" style={{ marginBottom: "32px" }} />
            <Wordmark size={52} color="#fff" spacing="0.35em" />
            <div style={{ marginTop: "6px" }}><Tagline size={10} color="#fff" opacity={0.3} /></div>
            <div style={{ marginTop: "52px", maxWidth: "520px", fontSize: "14px", fontFamily: B.body, color: "rgba(255,255,255,0.4)", lineHeight: 1.85, textAlign: "center" }}>
              NOCTVM este o platformă de cultură nightlife născută la intersecția dintre sensibilitatea high fashion și cultura muzicală underground. Acest document definește limbajul vizual care face NOCTVM inconfundabil.
            </div>
            <div style={{ marginTop: "40px", display: "flex", gap: "16px", justifyContent: "center", flexWrap: "wrap" }}>
              {["NIGHTLIFE PLATFORM", "CONSTANȚA · BUCUREȘTI", "EST. 2026"].map((t, i) => (
                <span key={i} style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.18)", padding: "5px 14px", border: "1px solid rgba(255,255,255,0.05)", borderRadius: "2px" }}>{t}</span>
              ))}
            </div>
          </div>
        </section>

        <Div />

        {/* ── LOGO ── */}
        <section id="logo" style={{ padding: "80px 32px", background: B.void }}>
          <div style={{ maxWidth: "1100px", margin: "0 auto" }}>
            <SH n="01 — IDENTITY" title="Logo System" sub="Simbolul NOCTVM — luna crescentă care răsare din mare. Versiunea mirrored deschide spre dreapta, înlocuind C-ul din wordmark pentru varianta integrată." />

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: "2px", marginBottom: "48px" }}>
              {/* Primary dark */}
              <div style={{ background: B.obsidian, padding: "56px 32px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "280px" }}>
                <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.18)", marginBottom: "28px" }}>PRIMARY — DARK</span>
                <Lockup size="lg" color="#fff" layout="vertical" />
              </div>
              {/* Primary light */}
              <div style={{ background: B.chalk, padding: "56px 32px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "280px" }}>
                <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(0,0,0,0.2)", marginBottom: "28px" }}>PRIMARY — LIGHT</span>
                <Lockup size="lg" color={B.void} layout="vertical" />
              </div>
              {/* Integrated dark */}
              <div style={{ background: B.void, padding: "56px 32px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "280px", border: "1px solid rgba(139,92,246,0.1)" }}>
                <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.2em", color: B.violet, marginBottom: "28px" }}>INTEGRATED MARK ★</span>
                <div style={{ textAlign: "center" }}><WordmarkIntegrated size={36} color="#fff" /><div style={{ marginTop: "8px" }}><Tagline size={8} color="#fff" /></div></div>
              </div>
              {/* Integrated light */}
              <div style={{ background: "#fff", padding: "56px 32px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "280px" }}>
                <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(0,0,0,0.2)", marginBottom: "28px" }}>INTEGRATED — LIGHT</span>
                <div style={{ textAlign: "center" }}><WordmarkIntegrated size={36} color={B.void} /><div style={{ marginTop: "8px" }}><Tagline size={8} color={B.void} /></div></div>
              </div>
              {/* Horizontal */}
              <div style={{ background: B.obsidian, padding: "56px 32px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "220px" }}>
                <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.18)", marginBottom: "28px" }}>HORIZONTAL</span>
                <Lockup size="md" color="#fff" layout="horizontal" />
              </div>
              {/* Symbol only */}
              <div style={{ background: B.smoke, padding: "56px 32px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "220px" }}>
                <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.18)", marginBottom: "28px" }}>SYMBOL ONLY</span>
                <Symbol size={72} color="#fff" />
                <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.15em", color: "rgba(255,255,255,0.15)", marginTop: "16px" }}>APP ICON · FAVICON · WATERMARK</span>
              </div>
              {/* Symbol mirrored */}
              <div style={{ background: B.smoke, padding: "56px 32px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "220px" }}>
                <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.18)", marginBottom: "28px" }}>SYMBOL MIRRORED</span>
                <SymbolMirrored size={72} color="#fff" />
                <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.15em", color: "rgba(255,255,255,0.15)", marginTop: "16px" }}>INTEGRATED WORDMARK · INLINE</span>
              </div>
              {/* Ultraviolet */}
              <div style={{ background: B.void, padding: "56px 32px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "220px", border: "1px solid rgba(139,92,246,0.1)" }}>
                <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(139,92,246,0.4)", marginBottom: "28px" }}>ULTRAVIOLET</span>
                <WordmarkIntegrated size={32} color={B.violet} />
              </div>
            </div>

            {/* Clear space */}
            <h3 style={{ fontSize: "10px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.3)", marginBottom: "12px" }}>CLEAR SPACE</h3>
            <div style={{ background: B.obsidian, padding: "60px", display: "flex", justifyContent: "center", marginBottom: "32px" }}>
              <div style={{ border: "1px dashed rgba(139,92,246,0.25)", padding: "36px 52px", position: "relative" }}>
                <Lockup size="md" color="#fff" layout="horizontal" />
                <span style={{ position: "absolute", top: "-18px", left: "50%", transform: "translateX(-50%)", fontSize: "8px", fontFamily: B.mono, color: "rgba(139,92,246,0.4)", letterSpacing: "0.1em" }}>1.5× SYMBOL HEIGHT</span>
              </div>
            </div>

            {/* Min sizes */}
            <h3 style={{ fontSize: "10px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.3)", marginBottom: "12px" }}>MINIMUM SIZES</h3>
            <div style={{ display: "flex", alignItems: "flex-end", gap: "32px", flexWrap: "wrap" }}>
              {[{ l: "MIN LOCKUP — 120px", c: <Lockup size="sm" color="#fff" layout="horizontal" /> }, { l: "MIN SYMBOL — 24px", c: <Symbol size={24} color="#fff" /> }, { l: "MIN INTEGRATED — 100px", c: <WordmarkIntegrated size={11} color="#fff" spacing="0.12em" /> }].map((x, i) => (
                <div key={i} style={{ textAlign: "center" }}>{x.c}<div style={{ fontSize: "8px", fontFamily: B.mono, color: "rgba(255,255,255,0.2)", marginTop: "10px", letterSpacing: "0.1em" }}>{x.l}</div></div>
              ))}
            </div>
          </div>
        </section>

        <Div />

        {/* ── COLORS ── */}
        <section id="colors" style={{ padding: "80px 32px", background: B.void }}>
          <div style={{ maxWidth: "1100px", margin: "0 auto" }}>
            <SH n="02 — PALETTE" title="Color System" sub="Paleta NOCTVM e construită din întuneric. Fundația e near-black. Culoarea intră rar, prin accente ultraviolet care evocă lumina UV, neonul, și ecranul în camera întunecată." />

            {[
              { title: "FOUNDATION — DARKNESS", items: [{ n: "Void", h: B.void, l: true }, { n: "Obsidian", h: B.obsidian, l: true }, { n: "Smoke", h: B.smoke }, { n: "Ash", h: B.ash }, { n: "Concrete", h: B.concrete }, { n: "Steel", h: B.steel }] },
              { title: "NEUTRALS — LIGHT", items: [{ n: "Bone", h: B.bone }, { n: "Chalk", h: B.chalk }, { n: "White", h: B.white }] },
              { title: "ACCENT — ULTRAVIOLET", items: [{ n: "Ultraviolet", h: B.ultraviolet, l: true }, { n: "Violet", h: B.violet, l: true }, { n: "Orchid", h: B.orchid }, { n: "Lavender", h: B.lavender }] },
              { title: "SIGNAL — FUNCTIONAL", items: [{ n: "Magenta", h: B.magenta }, { n: "Fuchsia", h: B.fuchsia }, { n: "Neon", h: B.neon }, { n: "Emerald", h: B.emerald }, { n: "Signal", h: B.signal }] },
            ].map((group, gi) => (
              <div key={gi} style={{ marginBottom: "32px" }}>
                <h3 style={{ fontSize: "10px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.3)", marginBottom: "12px" }}>{group.title}</h3>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(100px, 1fr))", gap: "8px" }}>
                  {group.items.map((c, i) => <Swatch key={i} name={c.n} hex={c.h} large={c.l} />)}
                </div>
              </div>
            ))}

            <h3 style={{ fontSize: "10px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.3)", marginBottom: "12px" }}>COLOR RATIO</h3>
            <div style={{ display: "flex", height: "40px", borderRadius: "2px", overflow: "hidden", marginBottom: "8px" }}>
              <div style={{ flex: 75, background: B.void }} /><div style={{ flex: 15, background: B.ash }} /><div style={{ flex: 8, background: B.violet }} /><div style={{ flex: 2, background: B.magenta }} />
            </div>
            <div style={{ display: "flex", gap: "20px", fontSize: "9px", fontFamily: B.mono, color: "rgba(255,255,255,0.25)", letterSpacing: "0.1em" }}>
              <span>75% DARKNESS</span><span>15% MID</span><span>8% ULTRAVIOLET</span><span>2% SIGNAL</span>

          </div>
        </section>

        <Div />

        {/* ── TYPOGRAPHY ── */}
        <section id="type" style={{ padding: "80px 32px", background: B.void }}>
          <div style={{ maxWidth: "1100px", margin: "0 auto" }}>
            <SH n="03 — TYPE SYSTEM" title="Typography" sub="Trei fonturi, o ierarhie strictă. Syne pentru impact. JetBrains Mono pentru sistem și date. DM Sans pentru lizibilitate. Nu le amesteca." />

            {[
              { label: "DISPLAY — SYNE", note: "HEADINGS · TITLES · HERO · WORDMARK", font: B.display, samples: [
                { w: 800, s: "48px", l: "ExtraBold 800", t: "NOCTVM", ls: "0.3em" },
                { w: 700, s: "30px", l: "Bold 700", t: "The Living Memory", ls: "0.02em" },
                { w: 600, s: "22px", l: "SemiBold 600", t: "Sunwaves 33 · Plaja Tuzla", ls: "0.01em" },

                  <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.1em", color: "rgba(255,255,255,0.15)" }}>{block.note}</span>

            {/* Body */}
            <div style={{ padding: "32px", background: B.obsidian, border: "1px solid rgba(255,255,255,0.04)", marginBottom: "32px", borderRadius: "2px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: "8px", marginBottom: "28px" }}>

                </div>
              ))}
            </div>
          </div>
        </section>

        <Div />

                { t: "do", d: "Folosește logo-ul pe fonduri întuneci.", c: <div style={{ background: B.void, padding: "24px", display: "flex", justifyContent: "center", borderRadius: "2px" }}><Lockup size="sm" color="#fff" layout="horizontal" /></div> },

                { t: "dont", d: "Nu distorsiona sau modifica proporțiile.", c: <div style={{ background: B.obsidian, padding: "24px", display: "flex", justifyContent: "center", borderRadius: "2px" }}><div style={{ transform: "skewX(-12deg) scaleY(1.3)", filter: "drop-shadow(0 0 15px rgba(255,0,0,0.4))" }}><Symbol size={36} color="#fff" /></div></div> },
              ].map((r, i) => (
                <div key={i} style={{ padding: "20px", background: r.t === "do" ? "rgba(16,185,129,0.04)" : "rgba(239,68,68,0.04)", border: `1px solid ${r.t === "do" ? "rgba(16,185,129,0.12)" : "rgba(239,68,68,0.12)"}`, borderRadius: "2px" }}>
                  <div style={{ fontSize: "9px", fontFamily: B.mono, letterSpacing: "0.2em", color: r.t === "do" ? B.emerald : B.signal, marginBottom: "12px", fontWeight: 700 }}>{r.t === "do" ? "✓ DO" : "✕ DON'T"}</div>
                  {r.c}
                  <div style={{ fontSize: "12px", fontFamily: B.body, color: "rgba(255,255,255,0.4)", marginTop: "12px", lineHeight: 1.6 }}>{r.d}</div>
                </div>
              ))}
            </div>
          </div>
        </section>

        <Div />

        <section id="apps" style={{ padding: "80px 32px", background: B.void }}>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: "2px" }}>
              {[
                { label: "APP ICON", c: <div style={{ width: "72px", height: "72px", borderRadius: "16px", background: `linear-gradient(135deg, ${B.void}, ${B.smoke})`, display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid rgba(255,255,255,0.06)" }}><Symbol size={40} color="#fff" /></div> },
                { label: "INSTAGRAM POST", c: <div style={{ width: "180px", height: "180px", background: `linear-gradient(135deg, ${B.void} 0%, #120a1e 50%, ${B.void} 100%)`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "8px" }}><Symbol size={24} color="#fff" /><div style={{ textAlign: "center" }}><div style={{ fontSize: "6px", fontFamily: B.mono, letterSpacing: "0.3em", color: "rgba(255,255,255,0.25)" }}>PRESENTS</div><div style={{ fontSize: "13px", fontFamily: B.display, fontWeight: 800, color: "#fff", lineHeight: 1.2 }}>SUNRISE<br />SESSION</div><div style={{ fontSize: "6px", fontFamily: B.mono, letterSpacing: "0.15em", color: B.violet, marginTop: "8px" }}>22.03 · EXPIRAT · BUC</div></div></div> },
                { label: "STICKER", c: <div style={{ width: "88px", height: "88px", borderRadius: "50%", background: B.void, border: "1.5px solid #fff", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "4px" }}><Symbol size={24} color="#fff" /><span style={{ fontSize: "7px", fontFamily: B.mono, letterSpacing: "0.2em", color: "#fff" }}>NOCTVM</span></div> },
                { label: "WRISTBAND", c: <div style={{ width: "200px", height: "36px", background: B.void, border: "1px solid rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 14px", borderRadius: "2px" }}><WordmarkIntegrated size={8} color="#fff" spacing="0.12em" /><span style={{ fontSize: "6px", fontFamily: B.mono, letterSpacing: "0.1em", color: "rgba(255,255,255,0.25)" }}>SW33 · TUZLA · 2026</span></div> },
                { label: "WATERMARK", c: <div style={{ width: "180px", height: "120px", background: "linear-gradient(135deg, #1a1a2e, #16213e)", display: "flex", alignItems: "flex-end", justifyContent: "flex-end", padding: "8px", borderRadius: "2px" }}><WordmarkIntegrated size={7} color="rgba(255,255,255,0.2)" spacing="0.08em" /></div> },
                { label: "DIGITAL TICKET", c: <div style={{ width: "160px", background: B.void, border: "1px solid rgba(255,255,255,0.06)", borderRadius: "2px", overflow: "hidden" }}><div style={{ padding: "14px", borderBottom: "1px dashed rgba(255,255,255,0.06)" }}><WordmarkIntegrated size={8} color="rgba(255,255,255,0.35)" spacing="0.1em" /><div style={{ fontSize: "12px", fontFamily: B.display, fontWeight: 800, color: "#fff", marginTop: "8px" }}>GAZETTE</div><div style={{ fontSize: "9px", fontFamily: B.display, fontWeight: 600, color: "rgba(255,255,255,0.5)" }}>CLOSING PARTY</div></div><div style={{ padding: "10px 14px", display: "flex", justifyContent: "space-between" }}>{[{ l: "DATE", v: "15.03" }, { l: "TIME", v: "23:00" }, { l: "PRICE", v: "50 RON" }].map((d, i) => <div key={i}><div style={{ fontSize: "6px", fontFamily: B.mono, color: "rgba(255,255,255,0.2)", letterSpacing: "0.15em" }}>{d.l}</div><div style={{ fontSize: "9px", fontFamily: B.mono, color: i === 2 ? B.violet : "#fff" }}>{d.v}</div></div>)}</div></div> },
              ].map((app, i) => (
                <div key={i} style={{ background: B.obsidian, padding: "48px", display: "flex", flexDirection: "column", alignItems: "center", gap: "16px" }}>
                  <span style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.15)" }}>{app.label}</span>
                  {app.c}
                </div>
              ))}
            </div>
          </div>
        </section>

        <Div />

        {/* ── VOICE ── */}
        <section id="voice" style={{ padding: "80px 32px", background: B.void }}>
          <div style={{ maxWidth: "1100px", margin: "0 auto" }}>
            <SH n="06 — VOICE" title="Voice & Tone" sub="NOCTVM vorbește ca cineva care știe — nu ca cineva care încearcă să vândă. Nu facem hype. Curăm." />
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: "12px", marginBottom: "32px" }}>
              {[
                { t: "SUNTEM", c: B.emerald, items: ["Confident, not arrogant", "Cultural, not pretentious", "Minimal, not empty", "Underground, not exclusionary", "Precise, not cold"] },
                { t: "NU SUNTEM", c: B.signal, items: ["Hype-driven", "Corporate / generic", "Try-hard", "Gatekeeping", "Loud for the sake of it"] },
                { t: "SPUNEM", c: B.violet, items: ['"Tonight."', '"The lineup speaks."', '"You were there."', '"Curated, not crowded."', '"Noaptea își amintește."'] },
                { t: "NU SPUNEM", c: "rgba(255,255,255,0.2)", items: ['"Best party ever!!!"', '"Don\'t miss out!"', '"Limited tickets!!!"', '"Epic night ahead!"', '"Tag your squad!"'] },
              ].map((b, i) => (
                <div key={i} style={{ padding: "20px", background: B.obsidian, border: "1px solid rgba(255,255,255,0.04)", borderRadius: "2px" }}>
                  <div style={{ fontSize: "9px", fontFamily: B.mono, letterSpacing: "0.2em", color: b.c, marginBottom: "14px", fontWeight: 700 }}>{b.t}</div>
                  {b.items.map((item, j) => <div key={j} style={{ fontSize: "12px", fontFamily: B.body, color: "rgba(255,255,255,0.5)", padding: "5px 0", borderBottom: j < b.items.length - 1 ? "1px solid rgba(255,255,255,0.03)" : "none" }}>{item}</div>)}

            <div style={{ padding: "28px", background: B.obsidian, border: "1px solid rgba(255,255,255,0.04)", borderRadius: "2px" }}>
              <h3 style={{ fontSize: "10px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.3)", marginBottom: "14px" }}>LIMBAJ</h3>
              <div style={{ fontSize: "14px", fontFamily: B.body, color: "rgba(255,255,255,0.5)", lineHeight: 1.8 }}>
                NOCTVM operează în română și engleză. Vocea default mixează ambele natural — ca și cultura. Elementele tehnice și UI rămân în engleză (Feed, Hub, Events). Conținutul cultural curge în română când lovește mai bine. „Noapte bună" lovește diferit decât „Good night."
              </div>
            </div>
          </div>
        </section>

        {/* Footer */}
        <footer style={{ padding: "48px 32px", background: B.void, textAlign: "center" }}>
          <Symbol size={32} color="rgba(255,255,255,0.08)" style={{ margin: "0 auto 12px" }} />
          <div style={{ fontSize: "8px", fontFamily: B.mono, letterSpacing: "0.2em", color: "rgba(255,255,255,0.1)" }}>NOCTVM BRAND SYSTEM v3.0 · CONFIDENTIAL · 2026</div>
        </footer>
      </div>
    </>
  );
}
