// ═══════════════════════════════════════════════════════
// GLSL SHADERS
// ═══════════════════════════════════════════════════════
const VS = `attribute vec2 aPosition;void main(){gl_Position=vec4(aPosition,0.0,1.0);}`;

const FS = `
precision highp float;
uniform vec2 uResolution;
uniform float uTime;
uniform vec2 uMouse;

#define PI 3.14159265359

float hash21(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);}

float noise(vec2 p){
  vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.0-2.0*f);
  float a=hash21(i);float b=hash21(i+vec2(1,0));float c=hash21(i+vec2(0,1));float d=hash21(i+vec2(1,1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}

float fbm(vec2 p){
  float v=0.0;float a=0.5;
  for(int i=0;i<6;i++){v+=a*noise(p);p*=2.0;a*=0.5;}
  return v;
}

float stars(vec2 uv,float t){
  float s=0.0;
  for(float i=0.0;i<3.0;i++){
    vec2 p=uv*(80.0+i*60.0);vec2 id=floor(p);vec2 f=fract(p)-0.5;
    float h=hash21(id+i*100.0);
    if(h>0.92){float br=(h-0.92)/0.08;float tw=0.7+0.3*sin(t*(1.0+h*3.0)+h*50.0);
    s+=br*tw*smoothstep(0.02+h*0.03,0.0,length(f));}
  }
  return s;
}

float moonSDF(vec2 p,vec2 c,float r){
  float d1=length(p-c)-r;
  vec2 off=c+vec2(r*0.55,-r*0.15);
  return max(d1,-length(p-off)+r*0.85);
}

vec3 renderMoon(vec2 uv,vec2 c,float r,float t){
  float d=moonSDF(uv,c,r);
  float moon=smoothstep(0.004,-0.002,d);
  float glow=clamp(0.015/max(abs(d),0.001),0.0,1.0)*smoothstep(0.15,0.0,d);
  float halo=exp(-max(d,0.0)*8.0)*0.3;
  return vec3(0.92,0.90,0.85)*moon+vec3(0.55,0.5,0.7)*glow*0.4+vec3(0.35,0.25,0.55)*halo;
}

float waterWaves(vec2 p,float t){
  float w=sin(p.x*2.5+t*0.4)*0.3+sin(p.x*5.0-t*0.6+1.0)*0.15+sin(p.x*11.0+t*0.8+2.5)*0.08+sin(p.x*23.0-t*1.2+p.y*3.0)*0.04;
  w+=fbm(p*3.0+t*0.15)*0.25;
  return w;
}

vec3 renderWater(vec2 uv,vec2 mc,float mr,float h,float t){
  if(uv.y>h)return vec3(0.0);
  float depth=(h-uv.y)/h;
  float distort=waterWaves(vec2(uv.x*4.0,depth*2.0),t)*0.02*(1.0-depth*0.5);
  vec2 ruv=vec2(uv.x+distort,h+(h-uv.y)*0.95+distort*0.5);
  float rmd=moonSDF(ruv,mc,mr);
  float rm=smoothstep(0.008,-0.003,rmd);
  float rg=clamp(0.01/max(abs(rmd),0.001),0.0,1.0)*smoothstep(0.2,0.0,rmd);
  float fade=exp(-depth*3.5);
  vec3 water=mix(vec3(0.02,0.02,0.05),vec3(0.01,0.01,0.03),depth);
  float trail=exp(-pow((uv.x-mc.x)*3.0,2.0))*fade;
  float tw=sin(depth*60.0+t*2.0)*0.5+0.5;
  tw*=sin(depth*25.0-t*1.5)*0.5+0.5;
  trail*=tw*0.4;
  water+=vec3(0.85,0.82,0.75)*rm*fade*0.6;
  water+=vec3(0.4,0.35,0.55)*rg*fade*0.3;
  water+=vec3(0.5,0.45,0.6)*trail;
  float wh=smoothstep(0.3,0.5,waterWaves(vec2(uv.x*8.0,depth*4.0),t*1.5))*0.02*fade;
  water+=vec3(0.4,0.38,0.5)*wh;
  return water;
}

vec3 renderHorizon(vec2 uv,float h,float t){
  float d=abs(uv.y-h);
  return vec3(0.4,0.35,0.5)*smoothstep(0.003,0.0,d)*0.15+vec3(0.2,0.15,0.3)*exp(-d*25.0)*0.08;
}

vec3 renderSky(vec2 uv,float h,float t){
  if(uv.y<h)return vec3(0.0);
  float sh=(uv.y-h)/(1.0-h);
  vec3 sky=mix(vec3(0.04,0.03,0.08),vec3(0.01,0.01,0.02),pow(sh,0.6));
  sky+=vec3(0.06,0.04,0.1)*exp(-sh*6.0);
  sky+=vec3(0.9,0.85,1.0)*stars(uv,t)*smoothstep(0.0,0.15,sh)*0.8;
  return sky;
}

void main(){
  vec2 uv=gl_FragCoord.xy/uResolution.xy;
  float aspect=uResolution.x/uResolution.y;
  vec2 p=uv;p.x*=aspect;
  float t=uTime;
  float horizon=0.38;
  vec2 mc=vec2(aspect*0.55,0.68)+(uMouse-0.5)*0.02;
  float mr=0.09;
  vec3 col=renderSky(p,horizon,t)+renderMoon(p,mc,mr,t)+renderHorizon(p,horizon,t)+renderWater(p,mc,mr,horizon,t);
  // vignette
  vec2 vc=uv-vec2(0.5,0.45);
  col*=smoothstep(0.5,0.2,length(vc)*1.4);
  // grain
  col+=((hash21(uv*1000.0+fract(t)*100.0))*2.0-1.0)*0.025;
  // color grade
  col=mix(col,col*vec3(0.9,0.85,1.1),0.3);
  col=pow(max(col,0.0),vec3(0.95));
  gl_FragColor=vec4(clamp(col,0.0,1.0),1.0);
}`;

// ═══════════════════════════════════════════════════════
// WEBGL HOOK
// ═══════════════════════════════════════════════════════
function useWebGL(ref) {
  const gl = useRef(null), prog = useRef(null), t0 = useRef(Date.now()), mouse = useRef({ x: 0.5, y: 0.5 }), raf = useRef(null);

  const init = useCallback(() => {
    const c = ref.current; if (!c) return;
    const g = c.getContext("webgl", { alpha: false, antialias: false, powerPreference: "high-performance" });
    if (!g) return; gl.current = g;
    const vs = g.createShader(g.VERTEX_SHADER); g.shaderSource(vs, VS); g.compileShader(vs);
    if (!g.getShaderParameter(vs, g.COMPILE_STATUS)) { console.error(g.getShaderInfoLog(vs)); return; }
    const fs = g.createShader(g.FRAGMENT_SHADER); g.shaderSource(fs, FS); g.compileShader(fs);
    if (!g.getShaderParameter(fs, g.COMPILE_STATUS)) { console.error(g.getShaderInfoLog(fs)); return; }
    const p = g.createProgram(); g.attachShader(p, vs); g.attachShader(p, fs); g.linkProgram(p);
    if (!g.getProgramParameter(p, g.LINK_STATUS)) { console.error(g.getProgramInfoLog(p)); return; }
    prog.current = p; g.useProgram(p);
    const buf = g.createBuffer(); g.bindBuffer(g.ARRAY_BUFFER, buf);
    g.bufferData(g.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), g.STATIC_DRAW);
    const pos = g.getAttribLocation(p, "aPosition"); g.enableVertexAttribArray(pos); g.vertexAttribPointer(pos, 2, g.FLOAT, false, 0, 0);
    t0.current = Date.now();
  }, []);

  const resize = useCallback(() => {
    const c = ref.current; if (!c) return;
    const d = Math.min(window.devicePixelRatio || 1, 2);
    c.width = window.innerWidth * d; c.height = window.innerHeight * d;
    gl.current?.viewport(0, 0, c.width, c.height);
  }, []);

  const render = useCallback(() => {
    const g = gl.current, p = prog.current, c = ref.current;
    if (!g || !p || !c) return;
    const t = (Date.now() - t0.current) / 1000;
    g.uniform2f(g.getUniformLocation(p, "uResolution"), c.width, c.height);
    g.uniform1f(g.getUniformLocation(p, "uTime"), t);
    g.uniform2f(g.getUniformLocation(p, "uMouse"), mouse.current.x, mouse.current.y);
    g.drawArrays(g.TRIANGLE_STRIP, 0, 4);
    raf.current = requestAnimationFrame(render);
  }, []);

  useEffect(() => {
    init(); resize();
    window.addEventListener("resize", resize);
    raf.current = requestAnimationFrame(render);
    return () => { window.removeEventListener("resize", resize); cancelAnimationFrame(raf.current); };
  }, [init, resize, render]);

  return { setMouse: (x, y) => { mouse.current = { x, y }; } };
}
