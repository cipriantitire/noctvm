<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    background: #0A0A0A;
    color: #E8E4DF;
    padding: 16px;
    min-height: 100vh;
  }
  h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 4px; }
  p  { font-size: 11px; color: #8A8A8A; margin-bottom: 16px; line-height: 1.5; }
  .btn {
    width: 100%;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #7C3AED; color: #fff; margin-bottom: 8px; }
  .btn-danger  { background: transparent; color: #EF4444; border: 1px solid #EF4444; font-size: 12px; }
  #log {
    margin-top: 14px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: #8A8A8A;
    line-height: 1.7;
    max-height: 200px;
    overflow-y: auto;
  }
  .ok  { color: #10B981; }
  .err { color: #EF4444; }
  .dim { color: #4A4A4A; }
</style>
</head>
<body>
  <h1>NOCTVM Theme</h1>
  <p>Creates a "NOCTVM" variable collection with all SDS overrides and NOCTVM-specific tokens.</p>
  <button class="btn btn-primary" id="btnApply">Apply NOCTVM Tokens</button>
  <button class="btn btn-danger"  id="btnRemove">Remove NOCTVM collection</button>
  <div id="log"></div>

<script>
const log = (msg, type = '') => {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${type}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
};

document.getElementById('btnApply').onclick = () => {
  document.getElementById('log').innerHTML = '';
  document.getElementById('btnApply').disabled = true;
  log('Starting…', 'dim');
  parent.postMessage({ pluginMessage: { type: 'apply' } }, '*');
};

document.getElementById('btnRemove').onclick = () => {
  if (!confirm('Remove the NOCTVM variable collection?')) return;
  parent.postMessage({ pluginMessage: { type: 'remove' } }, '*');
};

window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'log')    log(msg.text, msg.cls);
  if (msg.type === 'done')   document.getElementById('btnApply').disabled = false;
  if (msg.type === 'error') { log('✖ ' + msg.text, 'err'); document.getElementById('btnApply').disabled = false; }
};
</script>
</body>
</html>
